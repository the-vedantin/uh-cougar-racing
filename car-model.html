<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cougar Racing 3D Model</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      background: transparent;
      cursor: grab;
      opacity: 0;
      transition: opacity 220ms ease;
      touch-action: none;            /* let OrbitControls own touch gestures (orbit + pan) */
    }

    body[data-model-loaded="true"] canvas {
      opacity: 1;
    }

    canvas:active {
      cursor: grabbing;
    }

    /* Static (NON-rotating) graceful fallback, shown only if WebGL/the model
       genuinely cannot load. No turntable animation. */
    #fallback-car {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(96vw, 96vh);
      height: min(96vw, 96vh);
      object-fit: contain;
      transform: translate(-50%, -50%) rotate(90deg);
      pointer-events: none;
      user-select: none;
    }

    #status {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #fffffe;
      background: rgba(0, 0, 0, 0.58);
      border: 1px solid rgba(255, 255, 254, 0.24);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      line-height: 1.2;
      text-align: center;
      text-shadow: 0 1px 8px #000;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Diagnostic line, shown ONLY when 3D falls back, so the exact failure
       reason is visible (and screenshot-able) instead of guessed at. */
    #mv-diag {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      max-width: 92vw;
      color: #ffd1d1;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255, 80, 80, 0.5);
      border-radius: 10px;
      padding: 6px 12px;
      font: 12px/1.35 monospace;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
      pointer-events: none;
      z-index: 9;
    }
  </style>
</head>
<body>
  <div id="status">Loading 3D model</div>
  <script src="scripts/vendor/three.min.js"></script>
  <script src="scripts/vendor/OrbitControls.js"></script>
  <script src="scripts/vendor/GLTFLoader.js"></script>
  <script src="scripts/vendor/meshopt_decoder.js"></script>
  <script>
    (() => {
      const status = document.getElementById('status');

      const probeWebGL = () => {
        // Use a FRESH canvas per context type: a canvas can only ever hold one
        // context, so reusing it would make the second probe falsely report "no".
        const out = { webgl2: false, webgl: false, error: null };
        const tryCtx = type => {
          try { return !!document.createElement('canvas').getContext(type); }
          catch (e) { out.error = String((e && e.message) || e); return false; }
        };
        out.webgl2 = tryCtx('webgl2');
        out.webgl = tryCtx('webgl') || tryCtx('experimental-webgl');
        return out;
      };

      const showFallback = (reason, detail) => {
        document.body.dataset.modelLoaded = 'fallback';
        document.body.dataset.modelFallback = reason;
        if (status) status.remove();
        if (!document.getElementById('fallback-car')) {
          const image = document.createElement('img');
          image.id = 'fallback-car';
          image.alt = 'Cougar Racing 3D car model';
          image.src = 'media/fsae-car-fallback.png?v=2';
          document.body.appendChild(image);
        }
        if (!document.getElementById('mv-diag')) {
          const wg = probeWebGL();
          const diag = document.createElement('div');
          diag.id = 'mv-diag';
          diag.textContent =
            'why 3D fell back: ' + reason +
            (detail ? ' — ' + String(detail).slice(0, 100) : '') +
            '\nWebGL2: ' + (wg.webgl2 ? 'yes' : 'NO') +
            ' · WebGL: ' + (wg.webgl ? 'yes' : 'NO') +
            (wg.error ? ' · probe error: ' + wg.error.slice(0, 60) : '');
          document.body.appendChild(diag);
          document.body.dataset.modelDiag = diag.textContent.replace(/\n/g, ' | ');
        }
      };

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(28, 1, 0.1, 10000);
      let renderer = null;
      let canvas = null;

      const buildRenderer = () => {
        canvas = document.createElement('canvas');
        const preferredAttributes = {
          alpha: true,
          antialias: true,
          depth: true,
          stencil: false,
          preserveDrawingBuffer: false,
          powerPreference: 'default',
          failIfMajorPerformanceCaveat: false
        };
        const lightAttributes = { alpha: true, antialias: true, depth: true };
        const contextRequests = [
          ['webgl2', preferredAttributes],
          ['webgl', preferredAttributes],
          ['experimental-webgl', preferredAttributes],
          ['webgl2', lightAttributes],
          ['webgl', lightAttributes],
          ['experimental-webgl', lightAttributes],
          ['webgl2'],
          ['webgl'],
          ['experimental-webgl']
        ];
        let context = null;
        let contextName = '';
        for (const request of contextRequests) {
          try {
            context = canvas.getContext(request[0], request[1]);
            if (context) { contextName = request[0]; break; }
          } catch (_) {}
        }
        if (!context) throw new Error('No WebGL context returned by the browser');
        document.body.dataset.webglContext =
          context.constructor && context.constructor.name ? context.constructor.name : contextName;
        return new THREE.WebGLRenderer({
          canvas,
          context,
          alpha: true,
          antialias: true,
          powerPreference: 'default'
        });
      };

      try {
        renderer = buildRenderer();
      } catch (error) {
        console.error('Cougar Racing WebGL failed to start', error);
        showFallback('webgl-unavailable', (error && error.message) || error);
        return;
      }

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      let model = null;
      let needsRender = true;
      const requestRender = () => { needsRender = true; };

      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      if ('outputColorSpace' in renderer && THREE.SRGBColorSpace) {
        renderer.outputColorSpace = THREE.SRGBColorSpace;
      } else {
        renderer.outputEncoding = THREE.sRGBEncoding;
      }
      renderer.toneMapping = THREE.ACESFilmicToneMapping || THREE.LinearToneMapping;
      renderer.toneMappingExposure = 1.0;
      document.body.appendChild(renderer.domElement);

      // Studio environment map (PMREM): gives the clearcoat / specular / sheen
      // PBR materials smooth reflections so they read crisp instead of flat.
      const buildEnvironment = () => {
        const pmrem = new THREE.PMREMGenerator(renderer);
        const es = new THREE.Scene();
        es.add(new THREE.Mesh(
          new THREE.BoxGeometry(40, 40, 40),
          new THREE.MeshStandardMaterial({ side: THREE.BackSide, roughness: 1, metalness: 0, color: 0x2a2d33 })
        ));
        const panel = (w, h, x, y, z, color, intensity) => {
          const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshBasicMaterial({ color }));
          m.material.color.multiplyScalar(intensity);
          m.position.set(x, y, z);
          m.lookAt(0, 0, 0);
          es.add(m);
        };
        panel(14, 14, 8, 14, 8, 0xffffff, 3.0);
        panel(12, 12, -10, 9, -4, 0xeaf2ff, 1.6);
        panel(18, 7, 0, 16, 2, 0xffffff, 2.2);
        panel(10, 10, 6, 2, -12, 0xfff2e0, 1.2);
        const texture = pmrem.fromScene(es, 0.04).texture;
        es.traverse(o => { if (o.geometry) o.geometry.dispose(); });
        pmrem.dispose();
        return texture;
      };
      try { scene.environment = buildEnvironment(); } catch (e) { console.warn('env map skipped', e); }

      // --- Interaction: orbit + zoom + PAN -------------------------------
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.enablePan = true;            // panning enabled (right-drag / two-finger / Ctrl+drag)
      controls.screenSpacePanning = true;   // pan parallel to the screen, not the ground plane
      controls.panSpeed = 0.8;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.45;
      controls.rotateSpeed = 0.65;
      controls.zoomSpeed = 0.7;
      controls.addEventListener('change', requestRender);
      controls.addEventListener('start', () => { controls.autoRotate = false; });

      // Lighting is mostly carried by the environment map now; these just add
      // gentle directional shaping so it isn't flat. (Old rig was ~4x hotter
      // and, with no env map, made metals look noisy/"grainy".)
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      scene.add(new THREE.HemisphereLight(0xffffff, 0x363636, 0.4));

      const key = new THREE.DirectionalLight(0xffffff, 1.6);
      key.position.set(5, 8, 7);
      scene.add(key);

      const fill = new THREE.DirectionalLight(0xffffff, 0.8);
      fill.position.set(-7, 4, -5);
      scene.add(fill);

      const rim = new THREE.DirectionalLight(0xffffff, 0.7);
      rim.position.set(0, 5, -8);
      scene.add(rim);

      const resize = () => {
        const width = Math.max(1, window.innerWidth);
        const height = Math.max(1, window.innerHeight);
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        requestRender();
      };

      const frameModel = () => {
        const box = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        const size = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(size);
        model.position.sub(center);

        const framedBox = new THREE.Box3().setFromObject(model);
        const sphere = new THREE.Sphere();
        framedBox.getBoundingSphere(sphere);
        const radius = Math.max(sphere.radius, 1);

        // Tight near/far ratio (~40:1) so the depth buffer has precision and
        // the layered bodywork/decals don't z-fight. (Was 0.005r..200r ≈ 40000:1.)
        camera.near = radius * 0.2;
        camera.far = radius * 8;
        camera.position.set(radius * 0.95, radius * 0.62, radius * 1.35);
        camera.lookAt(0, 0, 0);
        camera.updateProjectionMatrix();

        controls.target.set(0, 0, 0);
        controls.minDistance = radius * 0.6;
        controls.maxDistance = radius * 4.4;
        // Keep panning from flinging the car off-screen.
        controls.update();
        requestRender();
      };

      // --- Robust model load: one automatic retry on transient failure ---
      const loader = new THREE.GLTFLoader();
      if (window.MeshoptDecoder) loader.setMeshoptDecoder(MeshoptDecoder);

      const onLoaded = gltf => {
        model = gltf.scene || gltf.scenes[0];
        model.traverse(child => {
          if (!child.isMesh) return;
          child.frustumCulled = false;
          const materials = Array.isArray(child.material) ? child.material : [child.material];
          materials.filter(Boolean).forEach(material => {
            // Keep each material's authored side. Forcing DoubleSide drew the
            // cockpit/interior backfaces and created the grey slab artifact.
            if ('envMapIntensity' in material) material.envMapIntensity = 1.0;
            material.needsUpdate = true;
          });
        });
        scene.add(model);
        frameModel();
        renderer.render(scene, camera);
        document.body.dataset.modelLoaded = 'true';
        renderer.domElement.style.opacity = '1';
        if (status) status.remove();
      };

      const onProgress = progress => {
        if (!progress.lengthComputable || !status) return;
        const percent = Math.round((progress.loaded / progress.total) * 100);
        status.textContent = `Loading 3D model ${percent}%`;
      };

      const loadModel = attempt => {
        loader.load(
          'media/fsae-car-26-web.glb?v=3',
          onLoaded,
          onProgress,
          error => {
            console.error('Cougar Racing GLB failed to load (attempt ' + attempt + ')', error);
            if (attempt < 2) {
              if (status) status.textContent = 'Retrying 3D model';
              setTimeout(() => loadModel(attempt + 1), 800);
            } else {
              const msg = error && (error.message || error.type || error.target && ('http ' + (error.target.status || '?'))) || error;
              showFallback('glb-load-failed', msg);
            }
          }
        );
      };
      loadModel(1);

      // --- WebGL context-loss recovery (mobile / GPU resets) --------------
      renderer.domElement.addEventListener('webglcontextlost', event => {
        event.preventDefault();          // allow the browser to restore the context
        if (status) { status.textContent = 'Restoring 3D model'; document.body.appendChild(status); }
      }, false);
      renderer.domElement.addEventListener('webglcontextrestored', () => {
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        if (model) { renderer.render(scene, camera); }
        if (status && document.body.contains(status)) status.remove();
        requestRender();
      }, false);

      // Render on demand (after interaction / auto-rotate), not a hot spin loop.
      const animate = () => {
        requestAnimationFrame(animate);
        if (controls.autoRotate) needsRender = true;
        controls.update();
        if (needsRender) { renderer.render(scene, camera); needsRender = false; }
      };

      resize();
      animate();
      window.addEventListener('resize', resize, { passive: true });
    })();
  </script>
</body>
</html>
