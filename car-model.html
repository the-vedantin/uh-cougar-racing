<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Samantha 3D Model</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      background: transparent;
      cursor: grab;
      opacity: 0;
      transition: opacity 220ms ease;
      touch-action: none;            /* let OrbitControls own touch gestures (orbit + pan) */
    }

    body[data-model-loaded="true"] canvas {
      opacity: 1;
    }

    canvas:active {
      cursor: grabbing;
    }

    /* Static (NON-rotating) graceful fallback, shown only if WebGL/the model
       genuinely cannot load. No turntable animation. */
    #fallback-car {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(96vw, 96vh);
      height: min(96vw, 96vh);
      object-fit: contain;
      transform: translate(-50%, -50%) rotate(90deg);
      pointer-events: none;
      user-select: none;
    }

    #status {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #fffffe;
      background: rgba(0, 0, 0, 0.58);
      border: 1px solid rgba(255, 255, 254, 0.24);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      line-height: 1.2;
      text-align: center;
      text-shadow: 0 1px 8px #000;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="status">Loading 3D model</div>
  <script src="scripts/vendor/three.min.js"></script>
  <script src="scripts/vendor/OrbitControls.js"></script>
  <script src="scripts/vendor/GLTFLoader.js"></script>
  <script src="scripts/vendor/meshopt_decoder.js"></script>
  <script>
    (() => {
      const status = document.getElementById('status');
      const showFallback = reason => {
        document.body.dataset.modelLoaded = 'fallback';
        document.body.dataset.modelFallback = reason;
        if (status) status.remove();
        if (document.getElementById('fallback-car')) return;
        const image = document.createElement('img');
        image.id = 'fallback-car';
        image.alt = 'Samantha 2025-2026 ICE Car';
        image.src = 'media/fsae-car-fallback.png?v=2';
        document.body.appendChild(image);
      };

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(28, 1, 0.1, 10000);
      let renderer = null;
      let canvas = null;

      const buildRenderer = () => {
        canvas = document.createElement('canvas');
        const preferredAttributes = {
          alpha: true,
          antialias: false,
          depth: true,
          stencil: false,
          preserveDrawingBuffer: false,
          powerPreference: 'default',
          failIfMajorPerformanceCaveat: false
        };
        const lightAttributes = { alpha: true, antialias: false, depth: true };
        const contextRequests = [
          ['webgl2', preferredAttributes],
          ['webgl', preferredAttributes],
          ['experimental-webgl', preferredAttributes],
          ['webgl2', lightAttributes],
          ['webgl', lightAttributes],
          ['experimental-webgl', lightAttributes],
          ['webgl2'],
          ['webgl'],
          ['experimental-webgl']
        ];
        let context = null;
        let contextName = '';
        for (const request of contextRequests) {
          try {
            context = canvas.getContext(request[0], request[1]);
            if (context) { contextName = request[0]; break; }
          } catch (_) {}
        }
        if (!context) throw new Error('No WebGL context returned by the browser');
        document.body.dataset.webglContext =
          context.constructor && context.constructor.name ? context.constructor.name : contextName;
        return new THREE.WebGLRenderer({
          canvas,
          context,
          alpha: true,
          antialias: false,
          powerPreference: 'default'
        });
      };

      try {
        renderer = buildRenderer();
      } catch (error) {
        console.error('Cougar Racing WebGL failed to start', error);
        showFallback('webgl-unavailable');
        return;
      }

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      let model = null;
      let needsRender = true;
      const requestRender = () => { needsRender = true; };

      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      if ('outputColorSpace' in renderer && THREE.SRGBColorSpace) {
        renderer.outputColorSpace = THREE.SRGBColorSpace;
      } else {
        renderer.outputEncoding = THREE.sRGBEncoding;
      }
      renderer.toneMapping = THREE.ACESFilmicToneMapping || THREE.LinearToneMapping;
      renderer.toneMappingExposure = 1.6;
      document.body.appendChild(renderer.domElement);

      // --- Interaction: orbit + zoom + PAN -------------------------------
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.enablePan = true;            // panning enabled (right-drag / two-finger / Ctrl+drag)
      controls.screenSpacePanning = true;   // pan parallel to the screen, not the ground plane
      controls.panSpeed = 0.8;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.45;
      controls.rotateSpeed = 0.65;
      controls.zoomSpeed = 0.7;
      controls.addEventListener('change', requestRender);
      controls.addEventListener('start', () => { controls.autoRotate = false; });

      scene.add(new THREE.AmbientLight(0xffffff, 2.35));
      scene.add(new THREE.HemisphereLight(0xffffff, 0x363636, 2.1));

      const key = new THREE.DirectionalLight(0xffffff, 4.2);
      key.position.set(5, 8, 7);
      scene.add(key);

      const fill = new THREE.DirectionalLight(0xffffff, 2.4);
      fill.position.set(-7, 4, -5);
      scene.add(fill);

      const rim = new THREE.DirectionalLight(0xffffff, 1.8);
      rim.position.set(0, 5, -8);
      scene.add(rim);

      const front = new THREE.DirectionalLight(0xffffff, 2.2);
      front.position.set(0, 2, 9);
      scene.add(front);

      const resize = () => {
        const width = Math.max(1, window.innerWidth);
        const height = Math.max(1, window.innerHeight);
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        requestRender();
      };

      const frameModel = () => {
        const box = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        const size = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(size);
        model.position.sub(center);

        const framedBox = new THREE.Box3().setFromObject(model);
        const sphere = new THREE.Sphere();
        framedBox.getBoundingSphere(sphere);
        const radius = Math.max(sphere.radius, 1);

        camera.near = radius / 200;
        camera.far = radius * 200;
        camera.position.set(radius * 0.95, radius * 0.62, radius * 1.35);
        camera.lookAt(0, 0, 0);
        camera.updateProjectionMatrix();

        controls.target.set(0, 0, 0);
        controls.minDistance = radius * 0.45;
        controls.maxDistance = radius * 4.4;
        // Keep panning from flinging the car off-screen.
        controls.update();
        requestRender();
      };

      // --- Robust model load: one automatic retry on transient failure ---
      const loader = new THREE.GLTFLoader();
      if (window.MeshoptDecoder) loader.setMeshoptDecoder(MeshoptDecoder);

      const onLoaded = gltf => {
        model = gltf.scene || gltf.scenes[0];
        model.traverse(child => {
          if (!child.isMesh) return;
          child.frustumCulled = false;
          const materials = Array.isArray(child.material) ? child.material : [child.material];
          materials.filter(Boolean).forEach(material => {
            material.side = THREE.DoubleSide;
            if ('envMapIntensity' in material) material.envMapIntensity = 1.8;
            material.needsUpdate = true;
          });
        });
        scene.add(model);
        frameModel();
        renderer.render(scene, camera);
        document.body.dataset.modelLoaded = 'true';
        renderer.domElement.style.opacity = '1';
        if (status) status.remove();
      };

      const onProgress = progress => {
        if (!progress.lengthComputable || !status) return;
        const percent = Math.round((progress.loaded / progress.total) * 100);
        status.textContent = `Loading 3D model ${percent}%`;
      };

      const loadModel = attempt => {
        loader.load(
          'media/fsae-car-26-web.glb?v=2',
          onLoaded,
          onProgress,
          error => {
            console.error('Cougar Racing GLB failed to load (attempt ' + attempt + ')', error);
            if (attempt < 2) {
              if (status) status.textContent = 'Retrying 3D model';
              setTimeout(() => loadModel(attempt + 1), 800);
            } else {
              showFallback('glb-load-failed');
            }
          }
        );
      };
      loadModel(1);

      // --- WebGL context-loss recovery (mobile / GPU resets) --------------
      renderer.domElement.addEventListener('webglcontextlost', event => {
        event.preventDefault();          // allow the browser to restore the context
        if (status) { status.textContent = 'Restoring 3D model'; document.body.appendChild(status); }
      }, false);
      renderer.domElement.addEventListener('webglcontextrestored', () => {
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        if (model) { renderer.render(scene, camera); }
        if (status && document.body.contains(status)) status.remove();
        requestRender();
      }, false);

      // Render on demand (after interaction / auto-rotate), not a hot spin loop.
      const animate = () => {
        requestAnimationFrame(animate);
        if (controls.autoRotate) needsRender = true;
        controls.update();
        if (needsRender) { renderer.render(scene, camera); needsRender = false; }
      };

      resize();
      animate();
      window.addEventListener('resize', resize, { passive: true });
    })();
  </script>
</body>
</html>
